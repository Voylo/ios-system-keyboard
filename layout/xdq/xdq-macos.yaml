        ] ! @ # $ % ^ & * { } – »
          № ~ © ® ° ´ · § щ ' " « »
          ф ы – — ™ ₽ ∞ µ ≈ … э
          ≠ ≤ ≥ ‹ › ‚ ь „ ю "
