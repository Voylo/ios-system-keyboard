# Physical macOS layout following the native "–Р–њ—Б—Г–∞ 2" (Apsua 2) standard.
# Base letters sit on the visible layer; the Abkhaz descender/special letters are produced with
# the Option (вМ•) modifier вАФ the macOS equivalent of the standard's AltGr / dead key:
#   —ЖвЖТ“µ  –ЇвЖТ“Ы  –≥вЖТ”Ј  –ЈвЖТ”°  —ЕвЖТ“≥  –њвЖТ‘•  —ЗвЖТ“Ј  —ВвЖТ“≠  “љвЖТ“њ
# (Ghayn ”Ј and pe ‘• here match the iOS default, per the native standard.)
# OTHER keys keep the common symbols from Apple's Russian macOS Option layer (√Ј вВљ ¬∞ вА¶ вЙ† ~ вЙ§ вЙ• вАҐ etc.).
# ¬Ђ ¬ї sit on two adjacent keys (Option+Shift gives the inner pair вАє вАЇ). The obscure вИЖ/вА†/¬µ are dropped
# and the Serbian/Macedonian letters removed вАФ those keys pass through, mirroring a standard Russian
# physical keyboard.
macOS:
  primary:
    layers:
      default: |
        “Я —Ж —Г –Ї –µ –љ –≥ —И ”Щ –Ј —Е “љ \
        —Д —Л –≤ –∞ –њ —А –Њ –ї –і –ґ '
        —Я —З —Б –Љ –Є —В —М –± “© /
      shift: &SHIFT |
        “Ю –¶ –£ –Ъ –Х –Э –У –® ”Ш –Ч –• “Љ |
        –§ –Ђ –Т –Р –Я –† –Ю –Ы –Ф –Ц "
        –П –І –° –Ь –Ш –Ґ –ђ –С “® ?
      caps: |
        “Ю –¶ –£ –Ъ –Х –Э –У –® ”Ш –Ч –• “Љ \
        –§ –Ђ –Т –Р –Я –† –Ю –Ы –Ф –Ц '
        –П –І –° –Ь –Ш –Ґ –ђ –С “® /
      caps+shift: *SHIFT
      alt: &ALT |
        “Я “µ —Г “Ы –µ –љ ”Ј —И ”Щ ”° “≥ “њ \
        —Д —Л –≤ √Ј ‘• вВљ ¬∞ ¬Ђ ¬ї вА¶ '
        —Я “Ј вЙ† –Љ –Є “≠ ~ вЙ§ вЙ• вАЬ
      alt+shift: |
        “Ю “і –£ “Ъ –Х –Э ”ґ –® ”Ш ”† “≤ “Њ |
        –§ –Ђ –Т √Ј ‘§ вВљ вАҐ вАє вАЇ вА¶ "
        –П “ґ вЙ† –Ь –Ш “ђ ~ < > вАЮ
      alt+caps: *ALT
      cmd: &CMD |
        q w e r t y u i o p [ ] \
        a s d f g h j k l ; '
        z x c v b n m , . /
      cmd+shift: &CMD_SHIFT |
        Q W E R T Y U I O P { } |
        A S D F G H J K L : "
        Z X C V B N M < > ?
      cmd+alt: *CMD
      cmd+alt+shift: *CMD_SHIFT
