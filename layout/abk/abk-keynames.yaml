# Подписи системных клавиш на абхазском языке. Переводы проверены носителем языка.
# Это подписи-действия (короткие слова), а не предложения — длинные слова обрезаются
# на клавише iPhone.
keyNames:
  space: Абжьажь
  return: Аҭагалара
  return-alts:
    search: Аԥшаара
    go: Аиасра
    send: Ашьҭра
    join: Аҿакра
    route: Амҩа
    next: Анаҩс
    continue: Ацҵара
    done: Ихиоуп
  emergency: SOS
  cancel: Аԥыхра
  undo: Архынҳәра
  redo: Аиҭаҟаҵара
