# ⚠️ ЧЕРНОВИК, НЕ ПРОВЕРЕНО — подписи системных клавиш на абхазском языке.
# Все значения ниже — предварительный машинный перевод; их ОБЯЗАТЕЛЬНО должен проверить носитель
# абхазского языка перед выпуском. Apple не выпускает интерфейс на абхазском, поэтому эти подписи
# нельзя сверить со скриншотами системы (в отличие от русского эталона в keyNames.md). Используется
# принцип родных терминов, как в che/mhr/dar, но точные слова и формы нужно проверить.
# Примечания для проверяющих:
#   - Это подписи-действия (глаголы / короткие слова), а не предложения. Делайте их КОРОТКИМИ —
#     длинные слова обрезаются на клавише iPhone (ср. рус. `join` → сокращение «Подкл.»).
#   - `emergency` оставлен как универсальное «SOS» (универсально на всех языках).
keyNames:
  space: Абжьара          # ПРОВЕРИТЬ — «промежуток/интервал»; или вариант «пустое место» (ср. марийск. «Яра вер»)
  return: Аҩналара        # ПРОВЕРИТЬ — «войти / ввод»
  return-alts:
    search: Аԥшаара       # ПРОВЕРИТЬ — «искать / найти»
    go: Ацара             # ПРОВЕРИТЬ — «идти / перейти»
    send: Ашьҭра          # ПРОВЕРИТЬ — «отправить»
    join: Аидҳәалара      # ПРОВЕРИТЬ — «подключиться / соединить» (вероятно, слишком длинно — нужна короткая форма)
    route: Амҩа           # ПРОВЕРИТЬ — «путь / дорога» (ср. марийск. «Корно»)
    next: Анаҩс           # ПРОВЕРИТЬ — «дальше / затем»
    continue: Ацҵара      # ПРОВЕРИТЬ — «продолжить»
    done: Хиоуп           # ПРОВЕРИТЬ — «готово / он готов»
  emergency: SOS          # универсальное, оставлено как есть
  cancel: Аԥыхра          # ПРОВЕРИТЬ — «отменить / аннулировать»
  undo: Ахынҳәра          # ПРОВЕРИТЬ — «вернуть / откатить» (отмена последнего действия)
  redo: Еиҭаҟаҵара         # ПРОВЕРИТЬ — «сделать снова / повторить»
