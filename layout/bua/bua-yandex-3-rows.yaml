        \s{spacer:0.3}   1 2 3 4 5 6 7 8 9 0 — \s{backspace:1.7}
        \s{spacer:0.6}   @ # № ₽ ´ & * ( ) ’ ” \s{return:1.4}
        \s{shift}        % _ - + = / ; : , .   \s{shift:2.0}
